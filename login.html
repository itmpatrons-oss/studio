<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lumina Dashboard - Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        body { display: flex; align-items: center; justify-content: center; height: 100vh; background-color: #0a0a0a; color: #f5f5f5; font-family: 'Montserrat', sans-serif; }
        .login-box { background: rgba(20, 20, 20, 0.9); padding: 40px; border-radius: 10px; border: 1px solid rgba(212, 175, 55, 0.2); box-shadow: 0 15px 35px rgba(0,0,0,0.5); width: 100%; max-width: 400px; text-align: center; }
        .login-box h2 { font-family: 'Cinzel', serif; color: #d4af37; margin-bottom: 20px; font-size: 2rem; }
        .input-group { margin-bottom: 20px; text-align: left; }
        .input-group label { display: block; margin-bottom: 5px; color: #aaaaaa; }
        .input-group input { width: 100%; padding: 12px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 5px; color: #fff; font-family: inherit; }
        .input-group input:focus { outline: none; border-color: #d4af37; }
        button { width: 100%; padding: 12px; background: #d4af37; color: #000; border: none; font-weight: 600; font-size: 1rem; border-radius: 5px; cursor: pointer; transition: 0.3s; }
        button:hover { background: #b89326; }
        #errMsg { color: #e74c3c; margin-top: 15px; font-size: 0.9rem; }
    </style>
</head>
<body>

    <div class="login-box">
        <h2>Admin Login</h2>
        <form id="loginForm">
            <div class="input-group">
                <label>Username</label>
                <input type="text" id="username" required autocomplete="off">
            </div>
            <div class="input-group">
                <label>Password</label>
                <input type="password" id="password" required autocomplete="off">
            </div>
            <button type="submit">Login</button>
            <div id="errMsg"></div>
        </form>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', (e) => {
            e.preventDefault();
            const u = document.getElementById('username').value;
            const p = document.getElementById('password').value;
            const btn = e.target.querySelector('button');
            const errMsg = document.getElementById('errMsg');
            
            btn.textContent = 'Authenticating...';
            errMsg.textContent = '';

            fetch('http://localhost:3000/api/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username: u, password: p })
            })
            .then(res => res.json())
            .then(data => {
                if (data.success) {
                    localStorage.setItem('lumina_admin_token', data.token);
                    window.location.href = 'admin.html';
                } else {
                    errMsg.textContent = data.error || 'Invalid username or password.';
                    btn.textContent = 'Login';
                }
            })
            .catch(err => {
                errMsg.textContent = 'Could not connect to server.';
                btn.textContent = 'Login';
            });
        });
    </script>
</body>
</html>
